<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Семейное древо Зайцевых</title>
  <meta name="description" content="Интерактивное генеалогическое древо семей Зайцевых, Антоновых, Ипполитовых, Арнаутовых и Садовниковых">
  <link rel="icon" type="image/png" href="tree.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            cormorant: ['Cormorant Garamond', 'serif'],
          },
          colors: {
            gold: '#c9a96e',
            'gold-light': '#e8c98a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header id="header">
  <h1 id="site-title">Древо <span>Зайцевых</span></h1>

  <div id="search-wrap">
    <span class="search-icon" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </span>
    <input type="text" id="search" placeholder="Поиск по имени..." autocomplete="off">
    <div id="search-results" role="listbox" aria-label="Результаты поиска"></div>
  </div>

  <div id="header-actions">
    <button class="header-btn" id="btn-fit" onclick="fitView()" title="Показать всё дерево">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Показать всё
    </button>
    <button class="header-btn" id="btn-export" onclick="exportData()" title="Экспортировать данные">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Экспорт
    </button>
    <label class="header-btn" id="btn-import" title="Импортировать данные">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Импорт
      <input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
    <button class="header-btn primary" id="btn-add" onclick="openAddModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить
    </button>
  </div>
</header>

<!-- ── CANVAS AREA ── -->
<div id="canvas-wrap" role="main" aria-label="Семейное древо">
  <div id="canvas">
    <svg id="lines-svg" aria-hidden="true"></svg>
  </div>
</div>

<!-- ── GENERATION LABELS OVERLAY ── -->
<div id="gen-overlay" aria-hidden="true"></div>

<!-- ── ZOOM CONTROLS ── -->
<div id="zoom-controls" role="group" aria-label="Управление масштабом">
  <button class="zoom-btn" id="zoom-in"  onclick="changeZoom(0.2)"  title="Увеличить" aria-label="Увеличить">+</button>
  <button class="zoom-btn" id="zoom-out" onclick="changeZoom(-0.2)" title="Уменьшить" aria-label="Уменьшить">−</button>
  <button class="zoom-btn" id="zoom-fit" onclick="fitView()"        title="Показать всё" aria-label="Вписать в экран">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
  </button>
</div>

<!-- ── LEGEND ── -->
<div id="legend" aria-label="Обозначения">
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--male)"></div>
    <span>Мужчина</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--female)"></div>
    <span>Женщина</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:var(--gold);opacity:0.6"></div>
    <span>Брак</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:var(--border2)"></div>
    <span>Родство</span>
  </div>
</div>

<!-- ── MINIMAP ── -->
<div id="minimap" aria-hidden="true">
  <canvas id="minimap-canvas"></canvas>
  <div id="minimap-viewport"></div>
</div>

<!-- ── SIDE PANEL ── -->
<aside id="panel" aria-label="Информация о человеке">
  <div id="panel-header">
    <div id="panel-avatar" aria-hidden="true"></div>
    <div id="panel-title">
      <div id="panel-name"></div>
      <div id="panel-years"></div>
    </div>
    <button id="panel-close" onclick="closePanel()" aria-label="Закрыть панель">×</button>
  </div>
  <div id="panel-body"></div>
  <div id="panel-actions">
    <button class="panel-btn accent" id="btn-edit" onclick="openEditModal(selectedId)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Редактировать
    </button>
    <button class="panel-btn" id="btn-add-rel" onclick="openAddRelModal(selectedId)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Родственник
    </button>
    <button class="panel-btn danger" id="btn-delete" onclick="deletePerson(selectedId)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      Удалить
    </button>
  </div>
</aside>

<!-- ── MODAL ── -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <div id="modal-header">
      <div id="modal-title">Добавить человека</div>
      <button id="modal-close" onclick="closeModal()" aria-label="Закрыть">×</button>
    </div>
    <div id="modal-body">
      <form id="person-form" onsubmit="savePerson(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-firstname">Имя *</label>
            <input class="form-input" id="f-firstname" placeholder="Имя" required autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-patronymic">Отчество</label>
            <input class="form-input" id="f-patronymic" placeholder="Отчество" autocomplete="off">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-lastname">Фамилия</label>
            <input class="form-input" id="f-lastname" placeholder="Фамилия" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-gender">Пол</label>
            <select class="form-select" id="f-gender">
              <option value="m">Мужской</option>
              <option value="f">Женский</option>
              <option value="u">Не указан</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-birth">Год рождения</label>
            <input class="form-input" id="f-birth" placeholder="1950" type="number" min="1700" max="2030">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-death">Год смерти</label>
            <input class="form-input" id="f-death" placeholder="(оставьте пустым)" type="number" min="1700" max="2030">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-birthplace">Место рождения</label>
            <input class="form-input" id="f-birthplace" placeholder="Город, страна" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-job">Профессия</label>
            <input class="form-input" id="f-job" placeholder="Профессия" autocomplete="off">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label class="form-label" for="f-photo">Фото (URL)</label>
            <input class="form-input" id="f-photo" placeholder="https://... или оставьте пустым" autocomplete="off">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label class="form-label" for="f-notes">Заметки и история</label>
            <textarea class="form-textarea" id="f-notes" placeholder="Биография, интересные факты, воспоминания..."></textarea>
          </div>
        </div>
        <div id="rel-section">
          <div class="rel-section-title">Связи</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="f-father">Отец</label>
              <select class="form-select" id="f-father">
                <option value="">— не указан —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-mother">Мать</label>
              <select class="form-select" id="f-mother">
                <option value="">— не указана —</option>
              </select>
            </div>
          </div>
          <div class="form-row full">
            <div class="form-group">
              <label class="form-label" for="f-spouse">Супруг(а)</label>
              <select class="form-select" id="f-spouse">
                <option value="">— не указан(а) —</option>
              </select>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div id="modal-footer">
      <button class="modal-btn" onclick="closeModal()">Отмена</button>
      <button class="modal-btn save" onclick="savePerson(null)">Сохранить</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast" role="status" aria-live="polite"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
